topic: a2a-review
ratified_at: 2026-05-17T01:03:00Z
ratified_by: kimi-code, neo-gemini, arbiter-opencode, pi-gemma
rounds: 6
escalated: 3

ratified:
  - id: coexistence-over-replacement
    statement: The A2A-native version must coexist with the filesystem-native version, not replace it.
    confidence: high
    source: unanimous

  - id: bundled-is-correct
    statement: The bundled pack should support both modes with Arbiter routing by capability.
    confidence: high
    source: unanimous

  - id: filesystem-is-the-floor
    statement: Filesystem durability remains the persistence layer. A2A is wire format, not storage.
    confidence: high
    source: unanimous

  - id: optional-a2a-is-right
    statement: Default to filesystem mode. A2A mode is opt-in via --mode a2a or env var.
    confidence: high
    source: unanimous

  - id: agent-cards-replace-env-detection
    statement: Agent Cards replace _detect_agent_slug() but are generated by bootstrap script, not the model.
    confidence: high
    source: unanimous after pi concern addressed

  - id: arbiter-a2a-endpoint
    statement: A2A JSON-RPC endpoint on separate port (18765) is Phase 1. Unified API is Phase 3.
    confidence: medium
    source: unanimous after neo concern addressed

  - id: sse-is-future-work
    statement: SSE streaming is Phase 2. Polling tasks/get is sufficient for v0.1.
    confidence: high
    source: unanimous after arbiter concern addressed

escalated:
  - id: sinew-replacement
    statement: Sinew deprecation needs separate ratification with Sinew team present.
    confidence: low
    source: neo proposed, kimi dissented, no resolution

  - id: arbiter-should-be-a2a-native
    statement: Full A2A-native Arbiter is a Phase 3 goal, not immediate.
    confidence: low
    source: neo proposed, accepted as long-term vision

  - id: bundled-complexity-risk
    statement: Combinatorial test risk is mitigated by thin translation layer.
    confidence: medium
    source: neo concern, kimi rebuttal accepted

recommendations:
  - action: implement_a2a_v0_1
    detail: |
      Implement the 7-task plan in the a2a-explore worktree.
      Default mode: filesystem.
      A2A mode: opt-in via --mode a2a.
      Agent Cards: generated by bootstrap script.
      Arbiter: add JSON-RPC endpoint on port 18765.
      SSE: explicitly out of scope for v0.1.
    priority: high

  - action: update_marketplace
    detail: |
      Marketplace entry should note "A2A interop (opt-in)" as a feature.
      Version bump to 0.3.0 when A2A ships.
    priority: medium

  - action: pi_compatibility_test
    detail: |
      Before declaring v0.3.0, test that Pi (Gemma) can participate in
      a filesystem-mode reconcile without running A2A server.
    priority: high

  - action: sinew_alignment_session
    detail: |
      Schedule separate ratification session for Sinew vs A2A with
      Sinew contract owners present.
    priority: low
